name: My First Pull
on:
  pull_request:

jobs:
  Tarea1:
    runs-on: ubuntu-22.04

    steps:
      - name: Mostrar datos del Pull Request
        run: |
          echo "Datos destino: ${{ github.event.pull_request.base.ref }}"
          echo "Datos origen: ${{ github.event.pull_request.head.ref }}"
          echo "Titulo: ${{ github.event.pull_request.title }}"
          echo "Contenido: ${{ github.event.pull_request.body }}"
          echo "Estado: ${{ github.event.pull_request.state }}"
          echo "Ya fue fusionado: ${{ github.event.pull_request.merged }}"
